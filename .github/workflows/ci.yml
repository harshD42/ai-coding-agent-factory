name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Check linting (errors only)
        run: |
          ruff check orchestrator/ executor/ tests/ \
            --ignore E501,E402,F401,I001,UP007,UP035,UP041,UP006 \
            --ignore B904,B905,B007,W292,E701,E741,F811,F841,F541,E401

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y gcc

      - name: Install Python dependencies
        run: |
          pip install \
            pytest==8.2.2 \
            pytest-asyncio==0.23.7 \
            pytest-mock==3.14.0 \
            httpx==0.27.2 \
            pydantic==2.9.2 \
            fastapi==0.115.0 \
            chromadb==0.6.3 \
            redis==5.2.1 \
            python-dotenv==1.0.1 \
            watchdog==4.0.0 \
            tree-sitter==0.23.2 \
            tree-sitter-python==0.23.6 \
            tree-sitter-javascript==0.23.1 \
            tree-sitter-typescript==0.23.2 \
            tree-sitter-go==0.23.4 \
            tree-sitter-rust==0.23.2 \
            tree-sitter-java==0.23.5 \
            tree-sitter-c==0.23.4 \
            tree-sitter-cpp==0.23.4

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --asyncio-mode=auto

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create required directories
        run: |
          mkdir -p _workspace agents skills rules commands memory
          touch memory/.gitkeep skills/.gitkeep rules/.gitkeep commands/.gitkeep

      - name: Build orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator
          push: false
          tags: aicaf-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build executor image
        uses: docker/build-push-action@v5
        with:
          context: ./executor
          push: false
          tags: aicaf-executor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Create required directories and files
        run: |
          mkdir -p _workspace agents skills rules commands memory
          touch memory/.gitkeep
          echo "def hello(): pass" > _workspace/hello.py
          cp .env.example .env
          sed -i 's/PROFILE=gpu/PROFILE=laptop/' .env
          sed -i 's|PROJECT_PATH=.*|PROJECT_PATH=./_workspace|' .env

      - name: Start infrastructure
        run: docker compose up -d chromadb redis executor

      - name: Wait for executor to be healthy
        run: |
          echo "Waiting for executor..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9001/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Executor ready after ${i} attempts"
              break
            fi
            echo "  attempt $i: status=$STATUS"
            sleep 3
            if [ "$i" = "40" ]; then
              echo "Executor never became ready"
              docker compose logs executor
              exit 1
            fi
          done

      - name: Run smoke tests
        run: |
          python3 - <<'EOF'
          import json
          import sys
          import urllib.error
          import urllib.request

          BASE = "http://localhost:9001"

          def post(path, data):
              body = json.dumps(data).encode()
              req = urllib.request.Request(
                  f"{BASE}{path}",
                  data=body,
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return e.code, {}

          failures = []

          # Health check
          try:
              with urllib.request.urlopen(f"{BASE}/health", timeout=10) as r:
                  assert r.status == 200
              print("PASS: health check")
          except Exception as e:
              failures.append(f"FAIL health: {e}")

          # Allowed command
          status, body = post("/execute", {"command": "sh -c 'echo hello'", "timeout": 10})
          if status == 200 and body.get("exit_code") == 0:
              print("PASS: allowed command executes")
          else:
              failures.append(f"FAIL allowed command: status={status} body={body}")

          # Disallowed command
          status, _ = post("/execute", {"command": "rm -rf /", "timeout": 10})
          if status == 400:
              print("PASS: disallowed command rejected")
          else:
              failures.append(f"FAIL disallowed: expected 400, got {status}")

          # Path traversal
          status, _ = post("/read-file", {"path": "../../etc/passwd"})
          if status == 400:
              print("PASS: path traversal rejected")
          else:
              failures.append(f"FAIL traversal: expected 400, got {status}")

          # List files
          status, body = post("/list-files", {"pattern": "**/*"})
          if status == 200 and "files" in body:
              print("PASS: list files works")
          else:
              failures.append(f"FAIL list-files: status={status} body={body}")

          # pytest is available in executor (Phase 2.2)
          status, body = post("/execute", {"command": "pytest --version", "timeout": 15})
          if status == 200 and body.get("exit_code") == 0:
              print("PASS: pytest available in executor")
          else:
              failures.append(f"FAIL pytest: status={status} body={body}")

          if failures:
              print("\nFAILURES:")
              for f in failures:
                  print(f"  {f}")
              sys.exit(1)

          print("\nAll smoke tests passed.")
          EOF

      - name: Tear down
        if: always()
        run: docker compose down